<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Khasbi Maulana</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #08111f;
      --ink: #f8fafc;
      --accent: #38bdf8;
      --muted: #94a3b8;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Manrope', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 0%, rgba(56, 189, 248, .18), transparent 34%),
        radial-gradient(circle at 82% 8%, rgba(167, 139, 250, .15), transparent 28%),
        linear-gradient(180deg, #08111f 0%, #0b1220 52%, #07101d 100%);
      color: var(--ink);
      font-family: var(--sans);
      text-align: center;
      padding: 24px;
    }
    .code { font-family: var(--mono); color: var(--accent); font-size: 120px; font-weight: 800; line-height: 1; letter-spacing: -.08em; }
    .msg { font-size: 20px; color: var(--muted); margin: 16px 0 32px; }
    a {
      display: inline-block;
      font-family: var(--mono);
      font-weight: 800;
      font-size: 14px;
      color: #04111f;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      padding: 14px 28px;
      border-radius: 999px;
      text-decoration: none;
      transition: transform .18s;
    }
    a:hover { transform: translateY(-2px); }
    .prompt { font-family: var(--mono); color: rgba(148,163,184,.4); font-size: 13px; margin-top: 48px; }
  </style>
</head>
<body>
  <div>
    <p class="code">404</p>
    <p class="msg">This page doesn't exist. Maybe it was a testnet that got deprecated.</p>
    <a href="/">← Back to Portfolio</a>
    <p class="prompt">$ cd /home</p>
  </div>
</body>
</html>
